<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="format-detection" content="telephone=no">
    <!-- 生产级安全策略：收紧CSP，仅允许同源脚本和内联脚本（因架构保留），但通过严格的转义防止XSS -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; frame-ancestors 'none'; connect-src 'self'; form-action 'none';">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
    <title>🔐 静谧·密钥 | 安全密码本</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
        :root {
            --bg-gradient-start: #eef2fa; --bg-gradient-end: #dce5f2; --card-bg: rgba(255,255,255,0.96);
            --app-bg: rgba(255,255,255,0.7); --text-primary: #1a2c3e; --text-secondary: #4f607a;
            --border-light: #ccd7f0; --btn-primary: linear-gradient(105deg, #4f7de8, #6c8fef);
            --shadow: rgba(0,0,0,0.1); --highlight-bg: #ffeb3b; --highlight-text: #1a2c3e;
            --strength-weak: #e8696a; --strength-medium: #f5a623; --strength-strong: #4caf50;
            --cat-tag-bg: rgba(79,125,232,0.12); --cat-tag-hover: rgba(79,125,232,0.25);
            --modal-input-bg: rgba(255,255,255,0.9); --warning-bg: #fff3e0; --warning-border: #f5a623;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-gradient-start: #1a2634; --bg-gradient-end: #0f1722; --card-bg: rgba(30,35,48,0.96);
                --app-bg: rgba(20,25,38,0.8); --text-primary: #eef2ff; --text-secondary: #9aa9c1;
                --border-light: #334155; --btn-primary: linear-gradient(105deg, #3b6ed6, #5a7fdf);
                --shadow: rgba(0,0,0,0.3); --highlight-bg: #f5a623; --highlight-text: #1a2c3e;
                --cat-tag-bg: rgba(59,110,214,0.2); --cat-tag-hover: rgba(59,110,214,0.35);
                --modal-input-bg: rgba(45,50,65,0.95); --warning-bg: #2a2418;
            }
        }
        body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; background: linear-gradient(145deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; transition: background 0.2s; -webkit-touch-callout: none; }
        body.modal-open { overflow: hidden; position: fixed; width: 100%; height: 100%; }
        .auth-card { background: var(--card-bg); backdrop-filter: blur(16px); border-radius: 48px; padding: 2rem 1.5rem; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 40px var(--shadow); border: 1px solid rgba(255,255,255,0.2); }
        .auth-icon { font-size: 3.8rem; margin-bottom: 0.5rem; }
        .auth-card h2 { font-size: 1.8rem; margin-bottom: 0.5rem; color: var(--text-primary); }
        .auth-card p { color: var(--text-secondary); margin-bottom: 1.5rem; }
        .auth-card input { width: 100%; padding: 14px 18px; border-radius: 60px; border: 1px solid var(--border-light); background: var(--card-bg); color: var(--text-primary); font-size: 16px; margin-bottom: 1rem; outline: none; -webkit-appearance: none; }
        .btn { background: var(--btn-primary); border: none; padding: 12px 20px; border-radius: 60px; color: white; font-weight: 600; font-size: 1rem; cursor: pointer; width: 100%; transition: 0.2s; text-align: center; touch-action: manipulation; min-height: 44px; }
        .small-btn { background: rgba(255,255,255,0.2); border: 1px solid var(--border-light); padding: 8px 14px; border-radius: 40px; font-size: 0.85rem; cursor: pointer; color: var(--text-primary); transition: 0.1s; display: inline-flex; align-items: center; justify-content: center; gap: 6px; min-height: 44px; text-align: center; line-height: 1; touch-action: manipulation; }
        .small-btn:active { transform: scale(0.96); background: rgba(255,255,255,0.45); }
        .app-container { background: var(--app-bg); backdrop-filter: blur(20px); border-radius: 40px; padding: 1.5rem; width: 100%; max-width: 1200px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 40px var(--shadow); -webkit-overflow-scrolling: touch; min-height: 500px; scrollbar-width: none; -ms-overflow-style: none; }
        .app-container::-webkit-scrollbar { display: none; }
        .app-header { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 1.2rem; }
        .logo { display: flex; align-items: center; gap: 8px; font-size: 1.4rem; font-weight: bold; color: var(--text-primary); }
        .logo span { font-size: 2rem; }
        .badge { background: var(--card-bg); padding: 4px 14px; border-radius: 40px; font-size: 0.75rem; font-weight: 500; color: var(--text-primary); }
        .search-bar { display: flex; gap: 10px; margin-bottom: 1rem; flex-wrap: wrap; justify-content: flex-end; }
        .search-bar input, .search-bar select { background: var(--card-bg); border: 1px solid var(--border-light); color: var(--text-primary); padding: 12px 16px; border-radius: 100px; font-size: 16px; -webkit-appearance: none; }
        .search-bar input { flex: 1; min-width: 180px; }
        .add-card { background: rgba(255,255,255,0.3); border-radius: 28px; padding: 1rem; margin-bottom: 1rem; }
        .form-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
        .form-row input, .form-row textarea, .form-row select { flex: 1; border-radius: 28px; background: var(--card-bg); border: 1px solid var(--border-light); padding: 12px 16px; font-size: 16px; color: var(--text-primary); -webkit-appearance: none; }
        .optional { display: none; }
        .optional.show { display: block; }
        .button-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
        .right-buttons { display: flex; gap: 8px; }
        .toolbar { display: flex; flex-wrap: wrap; gap: 16px; justify-content: space-between; align-items: center; margin: 1rem 0; }
        .sort-group { display: flex; align-items: center; gap: 12px; }
        select { -webkit-appearance: none; -moz-appearance: none; appearance: none; text-align: center; text-align-last: center; padding-left: 12px; padding-right: 12px; background-image: none !important; }
        #sortFieldSelect, #sortBtn { height: 44px; line-height: 1; font-size: 0.85rem; border-radius: 40px; border: 1px solid var(--border-light); background-color: var(--card-bg); color: var(--text-primary); cursor: pointer; padding: 0 12px; }
        .password-list { max-height: 55vh; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; -webkit-overflow-scrolling: touch; min-height: 280px; scrollbar-width: none; }
        .password-list::-webkit-scrollbar { display: none; }
        .password-item { background: rgba(255,255,255,0.1); backdrop-filter: blur(4px); border-radius: 24px; padding: 12px; display: flex; flex-wrap: wrap; align-items: center; gap: 10px; transition: 0.1s; }
        .item-info { flex: 2; min-width: 120px; }
        .cat { background: #4f7de8; color: white; display: inline-block; padding: 2px 10px; border-radius: 30px; font-size: 0.7rem; margin-bottom: 4px; }
        .item-pw { font-family: monospace; background: rgba(0,0,0,0.05); padding: 6px 12px; border-radius: 40px; font-size: 0.8rem; word-break: break-all; max-width: 140px; }
        .item-actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; z-index: 2000; }
        .modal-card { background: var(--card-bg); border-radius: 36px; padding: 1.8rem; width: 90%; max-width: 460px; color: var(--text-primary); max-height: 80vh; overflow-y: auto; box-shadow: 0 30px 50px rgba(0,0,0,0.3); }
        .modal-card .button-group { display: flex; gap: 14px; justify-content: space-between; margin-top: 24px; }
        .modal-card .button-group button { flex: 1; margin: 0; padding: 10px 0; }
        .modal-card input[type="password"], .modal-card input[type="text"] { width: 100%; padding: 14px 18px; border-radius: 60px; border: 1px solid var(--border-light); background: var(--modal-input-bg); color: var(--text-primary); font-size: 16px; margin: 8px 0 16px; outline: none; }
        .cat-manager-grid { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; max-height: 280px; overflow-y: auto; padding: 6px 2px; }
        .cat-tag { background: var(--cat-tag-bg); border: 1px solid var(--border-light); border-radius: 40px; padding: 8px 14px; display: inline-flex; align-items: center; gap: 10px; font-size: 0.85rem; }
        .cat-tag .cat-count { font-size: 0.7rem; background: rgba(0,0,0,0.1); border-radius: 30px; padding: 2px 8px; margin-left: 6px; }
        .cat-tag button { background: transparent; border: none; cursor: pointer; font-size: 1.1rem; color: var(--text-secondary); padding: 0 8px; min-height: 44px; }
        .cat-add-row { display: flex; gap: 12px; margin-top: 8px; margin-bottom: 16px; align-items: center; }
        .cat-add-row input { flex: 1; border-radius: 40px; background: var(--card-bg); border: 1px solid var(--border-light); padding: 10px 14px; }
        .info-badge { font-size: 0.7rem; color: var(--text-secondary); margin-bottom: 16px; text-align: center; background: rgba(0,0,0,0.05); padding: 6px; border-radius: 30px; }
        .log-view { max-height: 300px; overflow-y: auto; font-size: 0.8rem; font-family: monospace; }
        .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #1f2a3e; color: white; padding: 10px 24px; border-radius: 60px; font-size: 0.85rem; z-index: 3000; max-width: 90vw; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .warning-box { background: var(--warning-bg); border-left: 4px solid var(--warning-border); padding: 10px; border-radius: 16px; margin: 10px 0; font-size: 0.8rem; }
        .highlight { background-color: var(--highlight-bg); color: var(--highlight-text); border-radius: 4px; padding: 0 2px; }
        .batch-bar { position: sticky; bottom: 0; background: var(--card-bg); border-radius: 32px; padding: 10px; margin-top: 12px; display: flex; gap: 10px; justify-content: space-around; flex-wrap: wrap; }
        .checkbox-item { width: 24px; height: 24px; cursor: pointer; margin-right: 8px; }
        .strength-bar { height: 4px; width: 100%; background: var(--border-light); border-radius: 2px; margin-top: 4px; overflow: hidden; }
        .strength-fill { height: 100%; width: 0%; transition: width 0.2s; }
        .strength-text { font-size: 0.7rem; margin-top: 4px; text-align: left; }
        .gen-pw-btn { background: transparent; border: 1px solid var(--border-light); border-radius: 30px; padding: 8px 12px; cursor: pointer; font-size: 0.75rem; }
        @media (max-width: 600px) { .app-container { padding: 1rem; } .form-row { flex-direction: column; } .item-pw { max-width: 100px; } .toolbar { flex-direction: column; align-items: stretch; } .modal-card { padding: 1.2rem; } }
    </style>
</head>
<body>
<div id="root"></div>
<script>
(function(){
    // ======================= 安全增强常量 =======================
    const STORAGE_VAULT = 'serene_vault_encrypted';
    const STORAGE_SALT = 'serene_vault_salt';
    const STORAGE_AUTH = 'serene_vault_auth';
    const STORAGE_INIT = 'serene_vault_init';
    const BRUTE_FAIL_KEY = 'serene_brute_fail';
    const BRUTE_LOCK_KEY = 'serene_brute_lock_until';
    const LOG_STORAGE = 'serene_operation_log';
    const LAST_EXPORT_KEY = 'serene_last_export';
    const VERIFY_FAIL_KEY = 'serene_verify_fail';
    const VERIFY_LOCK_KEY = 'serene_verify_lock_until';
    const IMPORT_BRUTE_FAIL_KEY = 'serene_import_brute_fail';
    const IMPORT_BRUTE_LOCK_KEY = 'serene_import_brute_lock_until';
    const MAX_PASSWORDS = 10000;
    const PASSWORD_MIN_LEN = 6;
    const PASSWORD_MAX_LEN = 256;
    const MAX_CSV_SIZE_MB = 20;
    // 提升迭代次数至 600,000 (OWASP 2023推荐)
    const PBKDF2_ITERATIONS = 600000;
    // 敏感操作二次验证缓存 (5分钟)
    let lastReauthTime = 0;
    const REAUTH_VALIDITY_MS = 5 * 60 * 1000;
    
    let masterKey = null;
    let passwords = [];
    let customCategories = [];
    let visiblePasswords = new Set();
    let searchQuery = '';
    let searchField = 'all';
    let idleTimer = null;
    let lastActivity = Date.now();
    const IDLE_TIMEOUT = 5 * 60 * 1000;
    let batchMode = false;
    let selectedIds = new Set();
    let _sortDirection = true;
    let activeCategoryManagerModal = null;
    let clipboardTimer = null;
    let memoryBruteFailCount = 0;
    let memoryBruteLockUntil = 0;
    
    const DEFAULT_CATEGORIES = [ "E-Mail", "SIS001", "VPN", "密码箱", "视频影音", "其他", "娱乐", "工作", "社交", "证券期货", "购物", "购物旅行", "邮箱", "金融保险", "银行" ];
    let saveLock = null;
    
    // 辅助函数
    function showToast(msg, isError = false, duration = 2800) {
        const toast = document.createElement('div'); toast.className = 'toast'; toast.textContent = msg;
        if(isError) toast.style.background = '#c44545';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), duration);
        if(navigator.vibrate) navigator.vibrate(50);
    }
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
    function escapeAttr(str) { return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
    function formatDate(ts) { if(!ts) return ''; const d=new Date(ts); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
    function escapeRegex(str) { return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }
    function generateSecureId() { const arr = new Uint8Array(16); crypto.getRandomValues(arr); return Array.from(arr).map(b => b.toString(16).padStart(2,'0')).join(''); }
    function getPasswordStrength(pw) { if (!pw) return 0; let s=0; if(/[A-Z]/.test(pw)) s++; if(/[a-z]/.test(pw)) s++; if(/[0-9]/.test(pw)) s++; if(/[^A-Za-z0-9]/.test(pw)) s++; if(pw.length>=12) s=Math.min(s+1,4); else if(pw.length>=8 && s>=2) s=Math.min(s+0.5,4); return Math.min(Math.floor(s),4); }
    function isStrongPassword(pw) { if(pw.length<8) return false; let s=0; if(/[A-Z]/.test(pw)) s++; if(/[a-z]/.test(pw)) s++; if(/[0-9]/.test(pw)) s++; if(/[^A-Za-z0-9]/.test(pw)) s++; return s>=3; }
    function getStrengthText(level) { if(level===0) return '❌ 太弱'; if(level===1) return '⚠️ 弱'; if(level===2) return '📈 中等'; if(level===3) return '✅ 强'; return '💪 非常强'; }
    function getStrengthColor(level) { if(level<=1) return 'var(--strength-weak)'; if(level===2) return 'var(--strength-medium)'; return 'var(--strength-strong)'; }
    function generateStrongPassword(length=16) { const lower='abcdefghijklmnopqrstuvwxyz', upper='ABCDEFGHIJKLMNOPQRSTUVWXYZ', digits='0123456789', symbols='!@#$%^&*()_+-=[]{}|;:,.<>?'; const all=lower+upper+digits+symbols; let pw=''; pw+=lower[Math.floor(crypto.getRandomValues(new Uint8Array(1))[0]%lower.length)]; pw+=upper[Math.floor(crypto.getRandomValues(new Uint8Array(1))[0]%upper.length)]; pw+=digits[Math.floor(crypto.getRandomValues(new Uint8Array(1))[0]%digits.length)]; pw+=symbols[Math.floor(crypto.getRandomValues(new Uint8Array(1))[0]%symbols.length)]; for(let i=pw.length;i<length;i++) pw+=all[Math.floor(crypto.getRandomValues(new Uint8Array(1))[0]%all.length)]; return pw.split('').sort(()=>crypto.getRandomValues(new Uint8Array(1))[0]-128).join(''); }
    
    // 加密核心
    async function deriveKey(password, salt) { const enc = new TextEncoder(); const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']); return await crypto.subtle.deriveKey({ name: 'PBKDF2', salt, iterations: PBKDF2_ITERATIONS, hash: 'SHA-256' }, keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']); }
    async function encryptData(key, data) { const iv = crypto.getRandomValues(new Uint8Array(12)); const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, new TextEncoder().encode(JSON.stringify(data))); return { iv: Array.from(iv), ciphertext: Array.from(new Uint8Array(ciphertext)) }; }
    async function decryptData(key, obj) { const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: new Uint8Array(obj.iv) }, key, new Uint8Array(obj.ciphertext)); return JSON.parse(new TextDecoder().decode(decrypted)); }
    async function createAuthVerifier(key) { return await encryptData(key, { test: "serene-vault-verified" }); }
    async function verifyAuth(key, authData) { try { await decryptData(key, authData); return true; } catch(e) { return false; } }
    async function computePlainChecksum(data) { const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(JSON.stringify(data))); return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join(''); }
    function addLog(action, details) { let logs = JSON.parse(localStorage.getItem(LOG_STORAGE) || '[]'); logs.unshift({ time: new Date().toISOString(), action, details }); if(logs.length>200) logs.pop(); localStorage.setItem(LOG_STORAGE, JSON.stringify(logs)); }
    
    async function saveEncryptedWithLock() {
        if(saveLock) await saveLock;
        let resolveLock; saveLock = new Promise(resolve=>{ resolveLock=resolve; });
        try{ if(!masterKey) return; const vaultData = { passwords, customCategories, version:2, lastUpdated:Date.now() }; const encrypted = await encryptData(masterKey, vaultData); localStorage.setItem(STORAGE_VAULT, JSON.stringify(encrypted)); localStorage.setItem(STORAGE_INIT,'true'); refreshActiveCategoryManagerUI(); } catch(e){ showToast('保存失败: '+e.message, true); } finally { resolveLock(); saveLock=null; }
    }
    async function saveEncrypted() { await saveEncryptedWithLock(); }
    function refreshActiveCategoryManagerUI() { if(activeCategoryManagerModal && document.body.contains(activeCategoryManagerModal)){ const container = activeCategoryManagerModal.querySelector('#catListManage'); if(container) renderCategoryListWithCount(container); } }
    
    function loadCustomCategoriesFromVault() { return customCategories.length ? customCategories : [...DEFAULT_CATEGORIES]; }
    function getCustomCategoriesSet() { return new Set(loadCustomCategoriesFromVault()); }
    function saveCustomCategoriesToVault(catsArray) { customCategories = [...catsArray]; }
    function addCustomCategory(catName) { const trimmed = catName.trim(); if(!trimmed) return false; const current = loadCustomCategoriesFromVault(); if(current.includes(trimmed)) return false; current.push(trimmed); current.sort((a,b)=>a.localeCompare(b)); saveCustomCategoriesToVault(current); return true; }
    function removeCustomCategory(catName) { let current = loadCustomCategoriesFromVault(); const newList = current.filter(c=>c!==catName); if(newList.length!==current.length){ saveCustomCategoriesToVault(newList); return true; } return false; }
    function batchAddCustomCategories(newCats, replace=false) { if(!newCats.length) return false; if(replace){ saveCustomCategoriesToVault([...newCats]); return true; } else { const currentSet=getCustomCategoriesSet(); const toAdd=[...new Set(newCats.filter(c=>c&&c.trim()!==""&&!currentSet.has(c.trim())))].map(c=>c.trim()); if(toAdd.length===0) return false; const current=loadCustomCategoriesFromVault(); const updated=[...current,...toAdd]; updated.sort((a,b)=>a.localeCompare(b)); saveCustomCategoriesToVault(updated); return true; } }
    function renderCategoryListWithCount(container){ const cats=loadCustomCategoriesFromVault(); const countMap=new Map(); for(let p of passwords) if(p.category) countMap.set(p.category,(countMap.get(p.category)||0)+1); container.innerHTML=''; if(cats.length===0){ container.innerHTML='<div style="text-align:center; padding:20px; color:var(--text-secondary);">暂无自定义分类，点击上方添加</div>'; if(activeCategoryManagerModal?.querySelector('#catCount')) activeCategoryManagerModal.querySelector('#catCount').innerText='0'; return; } cats.forEach(cat=>{ const cnt=countMap.get(cat)||0; const tag=document.createElement('div'); tag.className='cat-tag'; tag.innerHTML=`<span>${escapeHtml(cat)} <span class="cat-count">${cnt}</span></span><button class="del-cat-icon" data-cat="${escapeAttr(cat)}" title="删除分类">🗑️</button>`; container.appendChild(tag); }); container.querySelectorAll('.del-cat-icon').forEach(btn=>{ btn.onclick=async(e)=>{ e.stopPropagation(); const cat=btn.dataset.cat; if(!cat) return; const verified=await promptCurrentPassword('删除分类'); if(!verified){ showToast('验证取消',false); return; } const affectedCount=passwords.filter(p=>p.category===cat).length; if(confirm(`⚠️ 确定删除分类“${cat}”吗？\n此操作将清空 ${affectedCount} 个密码条目的该分类字段，但不会删除密码条目本身。\n输入分类名称确认：`) && prompt(`请输入分类名称以确认删除:`)===cat){ removeCustomCategory(cat); for(let p of passwords) if(p.category===cat) p.category=''; await saveEncrypted(); renderListOnly(); refreshDatalist(); renderCategoryListWithCount(container); showToast(`已删除分类“${cat}”并清空相关条目分类`); } else { showToast('删除已取消或名称不匹配', false); } }; }); const countSpan=activeCategoryManagerModal?.querySelector('#catCount'); if(countSpan) countSpan.innerText=cats.length; }
    
    function getVerifyFailCount(){ return parseInt(localStorage.getItem(VERIFY_FAIL_KEY)||'0'); }
    function setVerifyFailCount(n){ localStorage.setItem(VERIFY_FAIL_KEY,n); }
    function getVerifyLockUntil(){ return parseInt(localStorage.getItem(VERIFY_LOCK_KEY)||'0'); }
    function setVerifyLockUntil(ts){ localStorage.setItem(VERIFY_LOCK_KEY,ts); }
    async function verifyWithLock(password){ const now=Date.now(); if(memoryBruteLockUntil>now){ const waitSec=Math.ceil((memoryBruteLockUntil-now)/1000); throw new Error(`验证尝试过于频繁，请等待 ${waitSec} 秒`); } const lockUntil=getVerifyLockUntil(); if(now<lockUntil){ const waitSec=Math.ceil((lockUntil-now)/1000); throw new Error(`验证尝试过于频繁，请等待 ${waitSec} 秒`); } const ok=await verifyMasterPassword(password); if(!ok){ let fail=getVerifyFailCount()+1; setVerifyFailCount(fail); memoryBruteFailCount++; if(memoryBruteFailCount>=5||fail>=5){ const lockEnd=now+60*60*1000; setVerifyLockUntil(lockEnd); memoryBruteLockUntil=lockEnd; setVerifyFailCount(0); memoryBruteFailCount=0; throw new Error('验证失败次数过多，已锁定1小时'); } throw new Error('主密码错误'); } setVerifyFailCount(0); setVerifyLockUntil(0); memoryBruteFailCount=0; memoryBruteLockUntil=0; return true; }
    async function promptCurrentPassword(actionName, returnPw=false){ return new Promise((resolve)=>{ const modal=document.createElement('div'); modal.className='modal'; modal.innerHTML=`<div class="modal-card"><h3>🔐 验证主密码</h3><p>执行「${escapeHtml(actionName)}」需要验证身份</p><input type="password" id="verifyPw" placeholder="请输入当前主密码" autocomplete="off" autofocus><div class="button-group"><button id="cancelVerify" class="small-btn">✖️ 取消</button><button id="confirmVerify" class="btn">✔️ 确认</button></div></div>`; document.body.appendChild(modal); document.body.classList.add('modal-open'); const input=modal.querySelector('#verifyPw'); const confirmBtn=modal.querySelector('#confirmVerify'); const cancelBtn=modal.querySelector('#cancelVerify'); const cleanup=()=>{ modal.remove(); document.body.classList.remove('modal-open'); }; confirmBtn.onclick=async()=>{ const pw=input.value; if(!pw){ showToast('请输入主密码',true); return; } try{ await verifyWithLock(pw); cleanup(); if(returnPw) resolve(pw); else resolve(true); }catch(e){ showToast(e.message,true); input.value=''; input.focus(); } }; cancelBtn.onclick=()=>{ cleanup(); resolve(returnPw?null:false); }; input.addEventListener('keypress',(e)=>{ if(e.key==='Enter') confirmBtn.click(); }); input.focus(); }); }
    async function verifyMasterPassword(password){ const saltArr=JSON.parse(localStorage.getItem(STORAGE_SALT)); const authData=JSON.parse(localStorage.getItem(STORAGE_AUTH)); if(!saltArr||!authData) throw new Error('未初始化'); const salt=new Uint8Array(saltArr); const key=await deriveKey(password,salt); return await verifyAuth(key,authData); }

    async function unlockVault(password){ try{ const lockUntil=getBruteLockUntil(); if(Date.now()<lockUntil) throw new Error(`尝试过于频繁，请等待 ${Math.ceil((lockUntil-Date.now())/1000)} 秒`); const saltArr=JSON.parse(localStorage.getItem(STORAGE_SALT)); const authData=JSON.parse(localStorage.getItem(STORAGE_AUTH)); if(!saltArr||!authData) throw new Error('未初始化'); const salt=new Uint8Array(saltArr); const key=await deriveKey(password,salt); const ok=await verifyAuth(key,authData); if(!ok){ let fail=getBruteFailCount()+1; setBruteFailCount(fail); if(fail>=5){ setBruteLockUntil(Date.now()+60*60*1000); setBruteFailCount(0); throw new Error('密码错误次数过多，已锁定1小时'); } throw new Error('主密码错误'); } setBruteFailCount(0); setBruteLockUntil(0); masterKey=key; const vault=localStorage.getItem(STORAGE_VAULT); const decrypted=await decryptData(masterKey,JSON.parse(vault)); if(Array.isArray(decrypted)){ passwords=decrypted; customCategories=[]; }else{ passwords=decrypted.passwords||[]; customCategories=decrypted.customCategories||[]; } if(!customCategories.length) customCategories=[...DEFAULT_CATEGORIES]; if(!decrypted.version || decrypted.version<2){ const vaultData={ passwords, customCategories, version:2, lastUpdated:Date.now() }; const newEnc=await encryptData(masterKey,vaultData); localStorage.setItem(STORAGE_VAULT,JSON.stringify(newEnc)); } addLog('登录','成功解锁保险库'); const lastExport=localStorage.getItem(LAST_EXPORT_KEY); if(lastExport && (Date.now()-parseInt(lastExport)>7*24*60*60*1000)) setTimeout(()=>showToast('📦 已7天未导出备份，建议立即导出保存',false,5000),1000); checkStorageQuota(); return true; }catch(e){ throw e; } }

    function renderListOnly(){ const listContainer=document.getElementById('listContainer'); if(!listContainer) return; let filtered=[...passwords]; if(searchQuery.trim()){ const q=searchQuery.toLowerCase(); filtered=filtered.filter(p=>{ if(searchField==='name') return p.name.toLowerCase().includes(q); if(searchField==='username') return (p.username||'').toLowerCase().includes(q); if(searchField==='category') return (p.category||'').toLowerCase().includes(q); if(searchField==='email') return (p.email||'').toLowerCase().includes(q); if(searchField==='phone') return (p.phone||'').toLowerCase().includes(q); if(searchField==='note') return (p.note||'').toLowerCase().includes(q); return p.name.toLowerCase().includes(q)||(p.username||'').toLowerCase().includes(q)||(p.category||'').toLowerCase().includes(q)||(p.email||'').toLowerCase().includes(q)||(p.phone||'').toLowerCase().includes(q)||(p.note||'').toLowerCase().includes(q); }); } const sortFieldVal=document.getElementById('sortFieldSelect')?.value||'name'; filtered.sort((a,b)=>{ let x=(a[sortFieldVal]||'').toLowerCase(); let y=(b[sortFieldVal]||'').toLowerCase(); return _sortDirection ? (x<y?-1:x>y?1:0) : (x<y?1:x>y?-1:0); }); const keyword=searchQuery.trim(); let listHtml=filtered.map(p=>{ const visible=visiblePasswords.has(p.id); const nameHtml=keyword?highlightText(p.name,keyword):escapeHtml(p.name); const usernameHtml=keyword&&p.username?highlightText(p.username,keyword):escapeHtml(p.username||''); const emailHtml=keyword&&p.email?highlightText(p.email,keyword):escapeHtml(p.email||''); return `<div class="password-item" style="display: flex; align-items: center;">${batchMode?`<input type="checkbox" class="checkbox-item batch-check" data-id="${escapeAttr(p.id)}" ${selectedIds.has(p.id)?'checked':''}>`:''}<div class="item-info">${p.category?`<span class="cat">📂 ${escapeHtml(p.category)}</span>`:''}<div><strong>${nameHtml}</strong></div><div style="font-size:0.7rem;">${usernameHtml?`👤 ${usernameHtml} `:''}${emailHtml?     async function showChangePwModal(){ const oldPw=await promptCurrentPassword('修改主密码',true); if(!oldPw){ showToast('验证取消',true); return; } const modal=document.createElement('div'); modal.className='modal'; modal.innerHTML=`<div class="modal-card"><h3>修改主密码</h3><input type="password" id="newPw" placeholder="新密码(≥8位，含三类字符)"><div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div><div class="strength-text" id="strengthText"></div><input type="password" id="confirmPw" placeholder="确认新密码"><button class="btn" id="doChange">修改</button></div>`; document.body.appendChild(modal); document.body.classList.add('modal-open'); const newPwInput=modal.querySelector('#newPw'); const strengthFill=modal.querySelector('#strengthFill'); const strengthText=modal.querySelector('#strengthText'); newPwInput.addEventListener('input',()=>{ const val=newPwInput.value; const level=getPasswordStrength(val); strengthFill.style.width=(level/4)*100+'%'; strengthFill.style.backgroundColor=getStrengthColor(level); strengthText.textContent=getStrengthText(level); strengthText.style.color=getStrengthColor(level); }); modal.querySelector('#doChange').onclick=async()=>{ const newP=newPwInput.value, confirm=modal.querySelector('#confirmPw').value; if(!newP) return showToast('请填写新密码',true); if(!isStrongPassword(newP)) return showToast('密码需≥8位且包含大写、小写、数字、特殊字符中的三类',true); if(newP!==confirm) return showToast('两次不一致',true); try{ await changeMasterPassword(oldPw,newP); modal.remove(); document.body.classList.remove('modal-open'); }catch(e){ showToast(e.message,true); } }; }
    async function changeMasterPassword(oldPw,newPw){ if(oldPw===newPw) throw new Error('新旧密码相同'); if(!isStrongPassword(newPw)) throw new Error('新密码需至少8位且包含大写、小写、数字、特殊字符中的至少三类'); await unlockVault(oldPw); const oldData={ passwords:[...passwords], customCategories:[...customCategories] }; const saltNew=crypto.getRandomValues(new Uint8Array(16)); const newKey=await deriveKey(newPw,saltNew); const newAuth=await createAuthVerifier(newKey); const encryptedNew=await encryptData(newKey,oldData); localStorage.setItem(STORAGE_SALT,JSON.stringify(Array.from(saltNew))); localStorage.setItem(STORAGE_AUTH,JSON.stringify(newAuth)); localStorage.setItem(STORAGE_VAULT,JSON.stringify(encryptedNew)); masterKey=newKey; passwords=oldData.passwords; customCategories=oldData.customCategories; addLog('修改主密码','主密码已更新'); showToast('✅ 主密码修改成功'); }
    
    function renderApp(){ const rootEl=document.getElementById('root'); if(!rootEl) return; rootEl.innerHTML=`<div class="app-container" id="appContainer"><div class="app-header"><div class="logo"><span>🔐</span> 静谧·密钥</div><div class="badge">📋 已存 <span id="countSpan">${passwords.length}</span> / ${MAX_PASSWORDS}</div><div style="display:flex; gap:8px;"><button class="small-btn" id="lockBtn">🔒 锁定</button><button class="small-btn" id="changeMasterPwBtn">🔐 改主密码</button><button class="small-btn" id="categoryManagerBtn">📂 分类</button><button class="small-btn" id="logBtn">📋 日志</button></div></div><div class="search-bar"><input type="text" id="searchInput" placeholder="🔍 搜索名称/账号/分类..." autocomplete="off"><select id="searchFieldSelect"><option value="all">全部字段</option><option value="name">名称</option><option value="username">用户名</option><option value="category">分类</option><option value="email">邮箱地址</option><option value="phone">手机号</option><option value="note">备注</option></select></div><div class="add-card"><div class="form-row"><input id="inpName" placeholder="名称 (必填)" maxlength="50"><input id="inpUsername" placeholder="用户名"><input id="inpPassword" placeholder="密码 (6-256字符)" maxlength="${PASSWORD_MAX_LEN}"><button class="gen-pw-btn" id="genPwBtn" type="button">🔀 生成</button></div><div class="optional" id="optionalFields"><div class="form-row"><input id="inpEmail" placeholder="邮箱地址" type="email"><input id="inpPhone" placeholder="手机号"><select id="inpCategory"><option value="">(无分类)</option></select></div><div class="form-row"><textarea id="inpNote" rows="2" placeholder="备注" maxlength="500"></textarea></div></div><div class="button-row"><button class="small-btn" id="toggleOptional">➕ 更多信息</button><div class="right-buttons"><button class="small-btn" id="clearForm">🗑️ 清空</button><button class="small-btn" id="addBtn">➕ 添加</button></div></div></div><div class="toolbar"><div class="sort-group"><select id="sortFieldSelect"><option value="name">排序:名称</option><option value="username">用户名</option><option value="category">分类</option></select><button class="small-btn" id="sortBtn">排序 ↕️</button></div><div class="action-group"><button class="small-btn" id="exportEncryptBtn">📤 导出(加密)</button><button class="small-btn" id="exportPlainBtn">📄 导出明文JSON</button><button class="small-btn" id="exportCsvBtn">📄 导出CSV</button><button class="small-btn" id="importBtn">📥 导入</button><button class="small-btn" id="batchBtn">☑️ 批量</button><button class="small-btn" id="wipeBtn" style="color:#d9534f;">⚠️ 清空全部</button><input type="file" id="fileInput" style="display:none" accept=".json,.csv"></div></div><div class="password-list" id="listContainer"></div><div id="batchBar" style="display:none;" class="batch-bar"><span>已选 <span id="batchCount">0</span> 项</span><button class="small-btn" id="batchDeleteBtn">🗑️ 删除</button><select id="batchCategorySelect"><option value="">移动分类</option></select><button class="small-btn" id="batchMoveBtn">移动</button><button class="small-btn" id="cancelBatchBtn">取消</button></div></div>`; const container=document.getElementById('appContainer'); container.addEventListener('click',async(e)=>{ const t=e.target; if(t.classList.contains('toggle-vis')){ const id=t.dataset.id; if(visiblePasswords.has(id)) visiblePasswords.delete(id); else visiblePasswords.add(id); renderListOnly(); } else if(t.classList.contains('copy-btn')) copyAndClear(t.dataset.pw); else if(t.classList.contains('edit-btn')){ const item=passwords.find(p=>p.id===t.dataset.id); if(item) openEditModal(item); } else if(t.classList.contains('del-btn')){ const item=passwords.find(p=>p.id===t.dataset.id); if(item && confirm(`删除“${item.name}”?`)){ passwords=passwords.filter(p=>p.id!==item.id); await saveEncrypted(); renderListOnly(); refreshDatalist(); showToast('已删除'); } } }); document.getElementById('searchInput').addEventListener('input',(e)=>{ searchQuery=e.target.value; renderListOnly(); resetIdleTimer(); }); document.getElementById('searchFieldSelect').addEventListener('change',(e)=>{ searchField=e.target.value; renderListOnly(); }); document.getElementById('addBtn').addEventListener('click',async()=>{ const name=document.getElementById('inpName').value.trim(); const pw=document.getElementById('inpPassword').value.trim(); if(!name||!pw) return showToast('名称和密码不能为空',true); if(pw.length<PASSWORD_MIN_LEN||pw.length>PASSWORD_MAX_LEN) return showToast(`密码需${PASSWORD_MIN_LEN}-${PASSWORD_MAX_LEN}个字符`,true); if(passwords.some(p=>p.name===name) && !confirm(`名称“${name}”已存在，是否继续保存？`)) return; if(passwords.length>=MAX_PASSWORDS) return showToast(`已达上限${MAX_PASSWORDS}`,true); const categoryVal=document.getElementById('inpCategory').value; passwords.unshift({ id:generateSecureId(), name, username:document.getElementById('inpUsername').value.trim(), email:document.getElementById('inpEmail').value.trim(), password:pw, phone:document.getElementById('inpPhone').value.trim(), category:categoryVal||'', note:document.getElementById('inpNote').value.trim(), createdAt:Date.now() }); await saveEncrypted(); renderListOnly(); refreshDatalist(); showToast(`✅ 已添加 ${name}`); resetIdleTimer(); }); document.getElementById('clearForm').onclick=()=>{ ['inpName','inpUsername','inpPassword','inpEmail','inpPhone','inpCategory','inpNote'].forEach(id=>{ let el=document.getElementById(id); if(el) el.value=''; }); document.getElementById('inpCategory').value=''; }; document.getElementById('toggleOptional').onclick=()=>document.getElementById('optionalFields').classList.toggle('show'); document.getElementById('sortBtn').onclick=()=>{ _sortDirection=!_sortDirection; renderListOnly(); }; document.getElementById('exportEncryptBtn').onclick=exportBackupEnhanced; document.getElementById('exportPlainBtn').onclick=exportPlaintextJSON; document.getElementById('exportCsvBtn').onclick=exportCSV; document.getElementById('batchBtn').onclick=toggleBatchMode; document.getElementById('cancelBatchBtn').onclick=toggleBatchMode; document.getElementById('batchDeleteBtn').onclick=batchDelete; document.getElementById('batchMoveBtn').onclick=()=>{ const cat=document.getElementById('batchCategorySelect').value; if(cat) batchMoveCategory(cat); }; document.getElementById('lockBtn').onclick=manualLock; document.getElementById('changeMasterPwBtn').onclick=showChangePwModal; document.getElementById('categoryManagerBtn').onclick=openCategoryManager; document.getElementById('logBtn').onclick=showLogs; document.getElementById('wipeBtn').onclick=wipeAllPasswords; document.getElementById('genPwBtn').onclick=()=>{ const newPw=generateStrongPassword(16); document.getElementById('inpPassword').value=newPw; showToast('已生成强密码'); }; const fileInput=document.getElementById('fileInput'); document.getElementById('importBtn').onclick=()=>{ if(!confirm('导入加密JSON或CSV，需信任来源')) return; const modalDiv=document.createElement('div'); modalDiv.className='modal'; modalDiv.innerHTML=`<div class="modal-card"><h3>导入选项</h3><label><input type="checkbox" id="trustPlainCheck"> 我信任此来源，允许导入明文</label><button class="btn" id="importFileBtn" style="margin-top:12px;">选择文件</button></div>`; document.body.appendChild(modalDiv); document.body.classList.add('modal-open'); modalDiv.querySelector('#importFileBtn').onclick=()=>{ const trustPlain=modalDiv.querySelector('#trustPlainCheck').checked; modalDiv.remove(); document.body.classList.remove('modal-open'); const inp=document.createElement('input'); inp.type='file'; inp.accept='.json,.csv'; inp.onchange=async(e)=>{ const file=e.target.files[0]; if(file.name.endsWith('.csv')){ if(!trustPlain){ showToast('CSV导入需信任来源',true); return; } importCSV(file,trustPlain); } else importFromFile(file,trustPlain); inp.remove(); }; inp.click(); }; }; refreshDatalist(); renderListOnly(); resetIdleTimer(); checkStorageQuota(); }
    
    async function importCSV(file, trust){ if(!trust){ showToast('请勾选信任来源',true); return; } if(file.size>MAX_CSV_SIZE_MB*1024*1024){ showToast(`CSV 文件过大，请选择不超过 ${MAX_CSV_SIZE_MB} MB 的文件`,true); return; } const text=await file.text(); const parseCSV=(txt)=>{ const rows=[]; let inQuote=false, currentRow=[], currentField=''; for(let i=0;i<txt.length;i++){ const ch=txt[i]; if(ch==='"'){ if(inQuote && txt[i+1]==='"'){ currentField+='"'; i++; } else inQuote=!inQuote; } else if(ch===',' && !inQuote){ currentRow.push(currentField); currentField=''; } else if(ch==='\n' && !inQuote){ currentRow.push(currentField); rows.push(currentRow); currentRow=[]; currentField=''; } else currentField+=ch; } if(currentField!==''||currentRow.length>0){ currentRow.push(currentField); rows.push(currentRow); } return rows; }; const lines=parseCSV(text); if(lines.length<2){ showToast('空文件',true); return; } const headers=lines[0].map(h=>h.trim().toLowerCase()); const idx={ name:headers.findIndex(h=>['name','标题','title','条目名称','名称'].includes(h)), username:headers.findIndex(h=>['username','用户名','login_username','账号'].includes(h)), email:headers.findIndex(h=>['email','邮箱','电子邮件','mail'].includes(h)), password:headers.findIndex(h=>['password','密码','login_password','pass'].includes(h)), category:headers.findIndex(h=>['category','分类','folder','文件夹','类别'].includes(h)), phone:headers.findIndex(h=>['phone','手机','mobile','电话'].includes(h)), note:headers.findIndex(h=>['note','备注','notes','注释','说明'].includes(h)) }; if(idx.name===-1||idx.password===-1){ if(!confirm(`CSV文件缺少“名称”或“密码”列，继续导入可能导致数据错位。是否仍要尝试导入？`)) return; } const importedRaw=[]; for(let i=1;i<lines.length;i++){ if(lines[i].length===0||(lines[i].length===1&&lines[i][0]==='')) continue; const row=lines[i]; const item={ name:idx.name>=0?(row[idx.name]||'').trim():'', username:idx.username>=0?(row[idx.username]||'').trim():'', email:idx.email>=0?(row[idx.email]||'').trim():'', password:idx.password>=0?(row[idx.password]||'').trim():'', category:idx.category>=0?(row[idx.category]||'').trim():'', phone:idx.phone>=0?(row[idx.phone]||'').trim():'', note:idx.note>=0?(row[idx.note]||'').trim():'' }; if(item.name && item.password) importedRaw.push(item); } if(importedRaw.length===0){ showToast('无有效数据',true); return; } const imported=importedRaw.map(i=>normalizeItem(i)); const conflictNames=imported.filter(i=>passwords.some(p=>p.name===i.name)); if(conflictNames.length>0 && !confirm(`检测到 ${conflictNames.length} 个名称与现有条目重复，继续导入会覆盖同名条目。是否继续？`)) return; const isOverwrite=confirm(`导入 ${imported.length} 条，覆盖当前？\n确定=覆盖，取消=合并（跳过名称重复）`); if(isOverwrite && imported.length>MAX_PASSWORDS){ showToast(`导入数量超过上限${MAX_PASSWORDS}`,true); return; } if(!isOverwrite && passwords.length+imported.length>MAX_PASSWORDS){ showToast(`超过上限`,true); return; } if(isOverwrite){ passwords=imported.slice(0,MAX_PASSWORDS); }else{ const existingNames=new Set(passwords.map(p=>p.name)); const newItems=imported.filter(it=>!existingNames.has(it.name)); passwords.push(...newItems.slice(0,MAX_PASSWORDS-passwords.length)); } syncPasswordsCategoriesToCustom(); await saveEncrypted(); renderListOnly(); refreshDatalist(); showToast('CSV导入完成'); addLog('导入CSV',`导入 ${imported.length} 条`); }
    function syncPasswordsCategoriesToCustom(){ const catsFromPasswords=new Set(); for(let p of passwords) if(p.category && p.category.trim()!=="") catsFromPasswords.add(p.category.trim()); if(catsFromPasswords.size===0) return; const currentSet=getCustomCategoriesSet(); const newCats=Array.from(catsFromPasswords).filter(c=>!currentSet.has(c)); if(newCats.length) batchAddCustomCategories(newCats,false); refreshDatalist(); }
    async function importFromFile(file, trustPlaintext){ if(file.size>MAX_CSV_SIZE_MB*1024*1024){ showToast(`文件过大`,true); return; } const text=await file.text(); let parsed; try{ parsed=JSON.parse(text); }catch(e){ showToast('无效JSON',true); return; } if(parsed && parsed.encrypted===true && parsed.salt && parsed.data){ const version=parsed.version||0; if(![2,3,4,5].includes(version)){ showToast('不支持的加密版本',true); return; } const pw=await promptPassword('输入备份的主密码'); if(!pw) return; try{ const key=await deriveKey(pw,new Uint8Array(parsed.salt)); const decrypted=await decryptData(key,parsed.data); if(version>=4 && parsed.plainChecksum){ const calc=await computePlainChecksum(decrypted); if(calc!==parsed.plainChecksum && !confirm('校验和不匹配，数据可能损坏，是否仍要导入？')) return; } let importedPasswords=[], importedCats=[]; if(Array.isArray(decrypted)){ importedPasswords=decrypted; }else{ importedPasswords=decrypted.passwords||[]; importedCats=decrypted.customCategories||[]; } let replace=false; if(importedCats.length>0) replace=confirm('检测到导入文件中包含分类库。是否清空当前分类库并使用文件中的分类？'); else replace=confirm('导入的文件不包含分类库，是否清空现有分类库？'); await applyImportWithCategories(importedPasswords,importedCats,replace); }catch(e){ showToast('解密失败，密码错误或文件损坏',true); } } else if(trustPlaintext && parsed && typeof parsed==='object' && 'passwords' in parsed && Array.isArray(parsed.passwords)){ let replace=false; if(parsed.customCategories && parsed.customCategories.length) replace=confirm('导入明文JSON包含分类库，是否清空当前分类库并替换？'); else replace=confirm('导入的明文文件不包含分类库，是否清空现有分类库？'); await applyImportWithCategories(parsed.passwords,parsed.customCategories||[],replace); } else if(trustPlaintext && Array.isArray(parsed)){ if(parsed.length===0){ showToast('文件无数据',true); return; } if(confirm(`预览前5条：\n${parsed.slice(0,5).map(p=>`${p.name} | ${p.password}`).join('\n')}\n\n是否导入？`)){ await applyImportWithCategories(parsed,[],false); } } else { showToast('格式不支持',true); } }
    async function applyImportWithCategories(importedPasswords,importedCats,replaceCategories){ importedPasswords=importedPasswords.slice(0,MAX_PASSWORDS).filter(i=>i&&i.name&&i.password); importedPasswords=importedPasswords.map(i=>normalizeItem(i)); if(importedPasswords.length===0){ showToast('无有效密码数据',true); return; } const isOverwrite=confirm(`覆盖当前数据？\n确定=覆盖，取消=合并（跳过名称重复）`); if(isOverwrite && importedPasswords.length>MAX_PASSWORDS){ showToast(`导入超过上限`,true); return; } if(!isOverwrite && passwords.length+importedPasswords.length>MAX_PASSWORDS){ showToast(`超过上限`,true); return; } if(isOverwrite){ passwords=importedPasswords; }else{ const existingNames=new Set(passwords.map(p=>p.name)); const newItems=importedPasswords.filter(it=>!existingNames.has(it.name)); passwords.push(...newItems.slice(0,MAX_PASSWORDS-passwords.length)); } if(replaceCategories){ saveCustomCategoriesToVault(importedCats.length?[...importedCats]:[]); }else if(importedCats.length){ batchAddCustomCategories(importedCats,false); } syncPasswordsCategoriesToCustom(); await saveEncrypted(); renderListOnly(); refreshDatalist(); addLog('导入',`完成，共 ${importedPasswords.length} 条密码`); showToast('导入完成'); }
    async function promptPassword(msg){ return new Promise(resolve=>{ const modal=document.createElement('div'); modal.className='modal'; modal.innerHTML=`<div class="modal-card"><p>${escapeHtml(msg)}</p><input type="password" id="modalPw" placeholder="主密码"><button id="modalOk" class="btn">确认</button></div>`; document.body.appendChild(modal); document.body.classList.add('modal-open'); modal.querySelector('#modalOk').onclick=()=>{ const val=modal.querySelector('#modalPw').value; modal.remove(); document.body.classList.remove('modal-open'); resolve(val); }; }); }
    
    function showAuth(){ const root=document.getElementById('root'); if(!root) return; const initialized=localStorage.getItem(STORAGE_INIT)==='true' && localStorage.getItem(STORAGE_SALT) && localStorage.getItem(STORAGE_AUTH) && localStorage.getItem(STORAGE_VAULT); if(!initialized){ root.innerHTML=`<div class="auth-card"><div class="auth-icon">🔐</div><h2>静谧·密钥</h2><p>首次使用，请设置主密码</p><button class="btn" id="setupBtn">设置主密码</button></div>`; document.getElementById('setupBtn').onclick=()=>{ const modal=document.createElement('div'); modal.className='modal'; modal.innerHTML=`<div class="modal-card"><h3>设置主密码</h3><div class="warning-box">⚠️ 密码需至少8位，且包含大写、小写、数字、特殊字符中的至少三类</div><input type="password" id="newPw1" placeholder="至少8位，含三类字符"><div class="strength-bar"><div class="strength-fill" id="setupStrengthFill"></div></div><div class="strength-text" id="setupStrengthText"></div><input type="password" id="newPw2" placeholder="确认密码"><button class="btn" id="confirmSetup">创建</button></div>`; document.body.appendChild(modal); document.body.classList.add('modal-open'); const pw1=modal.querySelector('#newPw1'); const strengthFill=modal.querySelector('#setupStrengthFill'); const strengthText=modal.querySelector('#setupStrengthText'); pw1.addEventListener('input',()=>{ const val=pw1.value; const level=getPasswordStrength(val); strengthFill.style.width=(level/4)*100+'%'; strengthFill.style.backgroundColor=getStrengthColor(level); strengthText.textContent=getStrengthText(level); strengthText.style.color=getStrengthColor(level); }); modal.querySelector('#confirmSetup').onclick=async()=>{ const p1=pw1.value; const p2=modal.querySelector('#newPw2').value; if(!isStrongPassword(p1)) return showToast('密码需≥8位且包含三类字符',true); if(p1!==p2) return showToast('密码不一致',true); try{ await initNewVault(p1); modal.remove(); document.body.classList.remove('modal-open'); showAuth(); showToast('✅ 设置成功'); }catch(e){ showToast(e.message,true); } }; }; } else { root.innerHTML=`<div class="auth-card"><div class="auth-icon">🔐</div><h2>静谧·密钥</h2><p>请输入主密码以解锁</p><input type="password" id="loginPw" placeholder="主密码" autofocus><button class="btn" id="loginBtn">验证进入</button><div class="error-msg" id="errorMsg"></div></div>`; const loginPw=document.getElementById('loginPw'); const loginBtn=document.getElementById('loginBtn'); const errorDiv=document.getElementById('errorMsg'); const doLogin=async()=>{ try{ await unlockVault(loginPw.value); renderApp(); }catch(e){ errorDiv.innerText=e.message; loginPw.value=''; loginPw.focus(); } }; loginBtn.onclick=doLogin; loginPw.addEventListener('keypress',e=>{ if(e.key==='Enter') doLogin(); }); loginPw.focus(); } }
    function bindIdleEvents(){ ['click','keydown','touchstart'].forEach(ev=>window.addEventListener(ev,resetIdleTimer)); }
    if(typeof crypto !== 'undefined' && crypto.subtle && (location.protocol==='https:' || location.hostname==='localhost' || location.hostname==='127.0.0.1')){ bindIdleEvents(); showAuth(); } else { document.getElementById('root').innerHTML=`<div class="auth-card"><h2>⚠️ 环境不安全</h2><p>请使用 HTTPS 或 localhost 访问以保证 Web Crypto API 正常工作。</p><p>当前协议：${location.protocol}</p></div>`; }
})();
